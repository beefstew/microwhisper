name: MicroWhisper Tests

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.gitignore'

jobs:
  test:
    name: Build and Test
    runs-on: macos-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: latest-stable
    
    - name: Install dependencies
      run: |
        # Install Whisper CLI if needed
        if [ ! -f /usr/local/bin/whisper ]; then
          brew install ffmpeg
          pip3 install -U openai-whisper
        fi
        
        # Install BlackHole if needed for system audio tests
        brew install blackhole-2ch
    
    - name: Build and Test
      run: |
        xcodebuild test -project microwhisper.xcodeproj -scheme microwhisper -destination 'platform=macOS' | xcpretty
      
    - name: Upload test results
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: test-results
        path: |
          ~/Library/Developer/Xcode/DerivedData/**/Logs/Test/*.xcresult
        retention-days: 7
