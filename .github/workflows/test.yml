name: MicroWhisper Tests

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.gitignore'

jobs:
  test:
    name: Build and Test
    runs-on: macos-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Xcode
      uses: maxim-lobanov/setup-xcode@v1.6.0
      with:
        xcode-version: '15.0'
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        # Install ffmpeg (required for Whisper)
        brew install ffmpeg
        
        # Install Whisper CLI using pip
        python -m pip install -U openai-whisper
        
        # Install BlackHole for system audio tests
        brew install blackhole-2ch
    
    - name: Check Xcode project structure
      run: |
        # Display project structure for debugging
        ls -la
        ls -la microwhisper.xcodeproj || echo "Project directory not found"
        
    - name: Validate Xcode project
      run: |
        # Check if project file exists and is valid
        if [ -f "microwhisper.xcodeproj/project.pbxproj" ]; then
          echo "Project file exists, checking format..."
          plutil -lint microwhisper.xcodeproj/project.pbxproj
        else
          echo "Project file not found!"
          exit 1
        fi
        
    - name: Build and Test
      run: |
        # Run tests with detailed output if there are issues
        set -o pipefail && xcodebuild clean test -project microwhisper.xcodeproj -scheme microwhisper -destination 'platform=macOS' -resultBundlePath TestResults.xcresult | xcpretty
      
    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results
        path: TestResults.xcresult
        retention-days: 7
