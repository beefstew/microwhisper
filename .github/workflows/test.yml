name: MicroWhisper Tests

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.gitignore'

jobs:
  test:
    name: Build and Test
    runs-on: macos-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Xcode
      uses: maxim-lobanov/setup-xcode@v1.6.0
      with:
        xcode-version: '15.0'
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
        cache-dependency-path: 'requirements.txt'
    
    - name: Cache Homebrew dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/Library/Caches/Homebrew
          /usr/local/Homebrew
        key: ${{ runner.os }}-brew-${{ hashFiles('.github/workflows/test.yml') }}
        restore-keys: |
          ${{ runner.os }}-brew-
    
    - name: Install dependencies
      run: |
        # Configure Homebrew to minimize build time
        export HOMEBREW_NO_AUTO_UPDATE=1
        export HOMEBREW_NO_INSTALL_CLEANUP=1
        
        # Install ffmpeg (required for Whisper)
        brew install ffmpeg
        
        # Install Whisper CLI using pip from requirements.txt
        python -m pip install -r requirements.txt
        
        # Install BlackHole for system audio tests
        brew install blackhole-2ch
    
    - name: Check Xcode setup
      run: |
        # Display Xcode version and path
        xcode-select -p
        xcodebuild -version
        
        # List available destinations
        xcodebuild -project microwhisper.xcodeproj -list
        
        # Verify project structure
        ls -la microwhisper.xcodeproj
    
    - name: Build and Test
      run: |
        # Use xcbeautify for better output formatting
        brew install xcbeautify
        
        # Run tests with standard configuration
        set -o pipefail && xcodebuild clean test \
          -project microwhisper.xcodeproj \
          -scheme microwhisper \
          -destination 'platform=macOS,arch=arm64' \
          -allowProvisioningUpdates \
          -resultBundlePath TestResults.xcresult | xcbeautify
      
    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results
        path: TestResults.xcresult
        retention-days: 7
