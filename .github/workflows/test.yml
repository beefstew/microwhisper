name: MicroWhisper Tests

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.gitignore'

jobs:
  test:
    name: Build and Test
    runs-on: macos-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Xcode
      uses: maxim-lobanov/setup-xcode@v1.6.0
      with:
        xcode-version: '15.0'
    
    - name: Install dependencies
      run: |
        # Install Whisper CLI
        brew install ffmpeg
        pip3 install -U openai-whisper
        
        # Install BlackHole for system audio tests
        brew install blackhole-2ch
    
    - name: Build and Test
      run: |
        xcodebuild clean test -project microwhisper.xcodeproj -scheme microwhisper -destination 'platform=macOS' -resultBundlePath TestResults.xcresult | xcpretty
      
    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results
        path: TestResults.xcresult
        retention-days: 7
