name: Build & Release DMG

on:
  push:
    tags: ['v*']         # e.g. v1.0.0
  workflow_dispatch:     # manual test runs (produces artifact, no release)

# Start from zero; each job grants only what it needs.
permissions: {}

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build DMG
    runs-on: macos-26
    timeout-minutes: 30
    permissions:
      contents: read        # no write token reachable from the build step
    steps:
      - name: Checkout (no persisted creds)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false   # don't leave the token in .git/config

      - name: Toolchain info
        run: |
          sw_vers
          xcodebuild -version

      - name: Resolve version
        id: v
        env:
          REF: ${{ github.ref }}   # pass context through env, never into shell directly
        run: |
          if [[ "$REF" == refs/tags/* ]]; then
            VERSION="${REF#refs/tags/v}"
          else
            VERSION="dev-$(git rev-parse --short HEAD)"
          fi
          # Refuse anything that isn't a plain version-ish string
          if [[ ! "$VERSION" =~ ^[A-Za-z0-9._-]+$ ]]; then
            echo "Rejecting suspicious version: $VERSION" >&2
            exit 1
          fi
          echo "version=$VERSION"                >> "$GITHUB_OUTPUT"
          echo "dmg=MicroWhisper-${VERSION}.dmg" >> "$GITHUB_OUTPUT"

      - name: Build (Release, universal, no signing identity)
        env:
          VERSION: ${{ steps.v.outputs.version }}
        run: |
          xcodebuild \
            -project microwhisper.xcodeproj \
            -scheme microwhisper \
            -configuration Release \
            -derivedDataPath build \
            ARCHS="arm64" \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            MARKETING_VERSION="$VERSION" \
            clean build

      - name: Verify icon made it into the bundle
        run: |
          APP="build/Build/Products/Release/microwhisper.app"
          echo "--- Resources:"
          ls -la "$APP/Contents/Resources/"
          echo "--- Info.plist icon keys:"
          plutil -extract CFBundleIconFile raw -o - "$APP/Contents/Info.plist" 2>/dev/null || true
          plutil -extract CFBundleIconName raw -o - "$APP/Contents/Info.plist" 2>/dev/null || true
          # Require at least one of: a real .icns, or a compiled Assets.car that contains AppIcon
          if [[ ! -f "$APP/Contents/Resources/AppIcon.icns" ]] && \
              ! (command -v assetutil >/dev/null && assetutil --info "$APP/Contents/Resources/Assets.car" 2>/dev/null | grep -q AppIcon); then
              echo "Icon assets missing from built bundle — aborting." >&2
              exit 1
          fi

      - name: Ad-hoc sign the .app
        run: |
          APP="build/Build/Products/Release/microwhisper.app"
          codesign --force --deep --sign - --timestamp=none "$APP"
          codesign --verify --verbose "$APP"

      - name: Create DMG
        env:
          DMG: ${{ steps.v.outputs.dmg }}
        run: |
          STAGE=build/dmg-stage
          rm -rf "$STAGE" && mkdir -p "$STAGE"
          cp -R build/Build/Products/Release/microwhisper.app "$STAGE/"
          ln -s /Applications "$STAGE/Applications"
          hdiutil create \
            -volname "MicroWhisper" \
            -srcfolder "$STAGE" \
            -ov -format UDZO \
            "$DMG"

      - name: Upload DMG as workflow artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dmg
          path: ${{ steps.v.outputs.dmg }}
          if-no-files-found: error
          retention-days: 7

  release:
    name: Publish Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest      # cheaper & isolated from the build env
    timeout-minutes: 10
    permissions:
      contents: write           # the only place a write token exists
    steps:
      - name: Download DMG
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: dmg

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO:  ${{ github.repository }}
          TAG:      ${{ github.ref_name }}
        run: |
          shopt -s nullglob
          files=( *.dmg )
          if (( ${#files[@]} != 1 )); then
            echo "Expected exactly one DMG, got ${#files[@]}" >&2
            exit 1
          fi
          gh release create "$TAG" \
            --title "MicroWhisper ${TAG#v}" \
            --generate-notes \
            "${files[0]}"
